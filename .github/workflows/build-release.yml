name: Build And Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: Face-Local

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.meta.outputs.base_version }}
      package_version: ${{ steps.meta.outputs.package_version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      macos_runs_on: ${{ steps.macos_runner.outputs.macos_runs_on }}
      macos_runner_note: ${{ steps.macos_runner.outputs.macos_runner_note }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: meta
        shell: bash
        run: |
          git fetch --tags --force
          export BASE_VERSION="$(python - <<'PY'
          import os
          import re
          import subprocess
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              configured = tomllib.load(fh)["project"]["version"]

          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", configured)
          if not match:
              raise SystemExit(f"pyproject version must be semver x.y.z, got: {configured}")

          major, minor, patch_floor = map(int, match.groups())
          prefix = f"v{major}.{minor}."
          tags = subprocess.check_output(["git", "tag", "--list", f"{prefix}*"], text=True).splitlines()

          patch_numbers = []
          for tag in tags:
              tag_match = re.fullmatch(rf"v{major}\.{minor}\.(\d+)", tag.strip())
              if tag_match:
                  patch_numbers.append(int(tag_match.group(1)))

          next_patch = patch_floor if not patch_numbers else max(max(patch_numbers) + 1, patch_floor)
          print(f"{major}.{minor}.{next_patch}")
          PY
          )"
          PACKAGE_VERSION="$BASE_VERSION"
          TAG="v${PACKAGE_VERSION}"
          RELEASE_NAME="Face-Local v${PACKAGE_VERSION}"

          {
            echo "base_version=$BASE_VERSION"
            echo "package_version=$PACKAGE_VERSION"
            echo "tag=$TAG"
            echo "release_name=$RELEASE_NAME"
          } >> "$GITHUB_OUTPUT"

      - id: macos_runner
        env:
          RUNNER_DISCOVERY_TOKEN: ${{ secrets.RUNNER_DISCOVERY_TOKEN }}
          DEFAULT_GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RUNNER_JSON='"macos-latest"'
          RUNNER_NOTE="Using GitHub-hosted macOS runner (fallback)."
          TOKEN_TO_USE="${RUNNER_DISCOVERY_TOKEN:-$DEFAULT_GITHUB_TOKEN}"
          export GH_TOKEN="$TOKEN_TO_USE"
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          RESPONSE_FILE="$(mktemp)"
          ERROR_FILE="$(mktemp)"
          FOUND_MATCH=""

          query_and_match() {
            local endpoint="$1"

            if gh api \
              -H "Accept: application/vnd.github+json" \
              "$endpoint" >"$RESPONSE_FILE" 2>"$ERROR_FILE"; then
              MATCH="$(RUNNERS_JSON="$(cat "$RESPONSE_FILE")" python - <<'PY'
          import json
          import os

          data = json.loads(os.environ["RUNNERS_JSON"])
          target_labels = {"self-hosted", "macOS", "ARM64"}
          target_name = "Koncsik-MacBook-Air"

          for runner in data.get("runners", []):
              labels = {label["name"] for label in runner.get("labels", [])}
              if (
                  runner.get("status") == "online"
                  and not runner.get("busy", False)
                  and (
                      runner.get("name") == target_name
                      or target_labels.issubset(labels)
                  )
              ):
                  print(json.dumps(["self-hosted", "macOS", "ARM64"]))
                  raise SystemExit(0)

          raise SystemExit(1)
          PY
              )" || true

              if [ -n "$MATCH" ]; then
                FOUND_MATCH="$MATCH"
                return 0
              fi

              return 1
            fi

            return 2
          }

          query_and_match "/repos/${OWNER}/${REPO}/actions/runners" || true

          if [ -z "$FOUND_MATCH" ]; then
            query_and_match "/orgs/${OWNER}/actions/runners" || true
          fi

          if [ -n "$FOUND_MATCH" ]; then
            RUNNER_JSON="$FOUND_MATCH"
            RUNNER_NOTE="Using self-hosted macOS ARM64 runner."
          fi

          echo "macos_runs_on=$RUNNER_JSON" >> "$GITHUB_OUTPUT"
          echo "macos_runner_note=$RUNNER_NOTE" >> "$GITHUB_OUTPUT"
          echo "$RUNNER_NOTE"

          if [ -z "$FOUND_MATCH" ]; then
            echo "No eligible self-hosted macOS ARM64 runner was discoverable. Falling back to macos-latest." >&2
            if [ -s "$ERROR_FILE" ]; then
              cat "$ERROR_FILE" >&2
            fi
            echo "Tip: set repository secret RUNNER_DISCOVERY_TOKEN with repo admin read access, or admin:org if the runner is org-level." >&2
          fi

  build-macos:
    needs: prepare
    runs-on: ${{ fromJSON(needs.prepare.outputs.macos_runs_on) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected macOS runner
        shell: bash
        run: echo "${{ needs.prepare.outputs.macos_runner_note }}"

      - name: Prepare writable Python tool cache
        if: ${{ !contains(needs.prepare.outputs.macos_runs_on, 'self-hosted') }}
        shell: bash
        run: |
          TOOLCACHE="${RUNNER_TEMP}/hostedtoolcache"
          mkdir -p "$TOOLCACHE"
          echo "AGENT_TOOLSDIRECTORY=$TOOLCACHE" >> "$GITHUB_ENV"
          echo "RUNNER_TOOL_CACHE=$TOOLCACHE" >> "$GITHUB_ENV"

      - name: Select local Python on self-hosted macOS
        if: ${{ contains(needs.prepare.outputs.macos_runs_on, 'self-hosted') }}
        shell: bash
        run: |
          find_python() {
            for candidate in python3.11 python3.12 python3.13 python3 python; do
              if command -v "$candidate" >/dev/null 2>&1; then
                if "$candidate" - <<'PY' >/dev/null 2>&1
          import sys
          raise SystemExit(0 if sys.version_info >= (3, 11) else 1)
          PY
                then
                  command -v "$candidate"
                  return 0
                fi
              fi
            done
            return 1
          }

          PY_BIN="$(find_python)" || {
            echo "Python 3.11+ was not found on the self-hosted macOS runner." >&2
            exit 1
          }

          SHIM_DIR="${RUNNER_TEMP}/python-shims"
          mkdir -p "$SHIM_DIR"
          ln -sf "$PY_BIN" "$SHIM_DIR/python"
          echo "$SHIM_DIR" >> "$GITHUB_PATH"
          echo "MACOS_PYTHON_BIN=$PY_BIN" >> "$GITHUB_ENV"
          "$PY_BIN" --version

      - uses: actions/setup-python@v6
        if: ${{ !contains(needs.prepare.outputs.macos_runs_on, 'self-hosted') }}
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build bundled app
        shell: bash
        run: python scripts/package_app.py --version "${{ needs.prepare.outputs.package_version }}"

      - name: Create release directory
        shell: bash
        run: mkdir -p release

      - name: Package macOS app
        shell: bash
        run: |
          ditto -c -k --keepParent "dist/Face-Local.app" "release/Face-Local-macOS-app-${{ needs.prepare.outputs.package_version }}.zip"
          rm -rf release/dmg-root
          mkdir -p release/dmg-root
          cp -R "dist/Face-Local.app" "release/dmg-root/"
          ln -s /Applications "release/dmg-root/Applications"
          hdiutil create \
            -volname "Face-Local" \
            -srcfolder "release/dmg-root" \
            -ov \
            -format UDZO \
            "release/Face-Local-macOS-installer-${{ needs.prepare.outputs.package_version }}.dmg"
          rm -rf release/dmg-root

      - name: Upload macOS assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python scripts/github_release.py upload \
            --repo "$GITHUB_REPOSITORY" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --name "${{ needs.prepare.outputs.release_name }}" \
            "release/*.zip" \
            "release/*.dmg"

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build bundled app
        shell: bash
        run: python scripts/package_app.py --version "${{ needs.prepare.outputs.package_version }}"

      - name: Create release directory
        shell: bash
        run: mkdir -p release

      - name: Package Windows installer
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ needs.prepare.outputs.package_version }}" "scripts\build_windows_installer.iss"
          Compress-Archive -Path "dist\Face-Local\*" -DestinationPath "release\Face-Local-windows-portable-${{ needs.prepare.outputs.package_version }}.zip" -Force

      - name: Upload Windows assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python scripts/github_release.py upload \
            --repo "$GITHUB_REPOSITORY" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --name "${{ needs.prepare.outputs.release_name }}" \
            "release/*.zip" \
            "release/*.exe"

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Linux packaging dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev libgl1 libglib2.0-0 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build bundled app
        shell: bash
        run: python scripts/package_app.py --version "${{ needs.prepare.outputs.package_version }}"

      - name: Create release directory
        shell: bash
        run: mkdir -p release

      - name: Package Linux installer
        shell: bash
        run: |
          chmod +x scripts/build_linux_deb.sh
          scripts/build_linux_deb.sh "${{ needs.prepare.outputs.package_version }}"

      - name: Upload Linux assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python scripts/github_release.py upload \
            --repo "$GITHUB_REPOSITORY" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --name "${{ needs.prepare.outputs.release_name }}" \
            "release/*.deb" \
            "release/*.tar.gz"

  release:
    if: >-
      ${{
        always() &&
        (
          needs.build-macos.result == 'success' ||
          needs.build-windows.result == 'success' ||
          needs.build-linux.result == 'success'
        )
      }}
    needs:
      - prepare
      - build-macos
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update GitHub release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          notes=$'Automated cross-platform build from `main`.\n\n'
          notes+="- Commit: ${GITHUB_SHA}"$'\n'
          notes+="- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"$'\n'
          notes+="- macOS runner: ${{ needs.prepare.outputs.macos_runner_note }}"$'\n'
          notes+="- macOS build: ${{ needs.build-macos.result }}"$'\n'
          notes+="- Windows build: ${{ needs.build-windows.result }}"$'\n'
          notes+="- Linux build: ${{ needs.build-linux.result }}"$'\n'
          python3 scripts/github_release.py update-notes \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --name "$RELEASE_NAME" \
            --notes "$notes"

  post-to-buffer:
    if: ${{ needs.release.result == 'success' && github.event_name == 'push' && github.run_attempt == 1 }}
    needs:
      - prepare
      - build-macos
      - build-windows
      - build-linux
      - release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Post release announcement via Buffer
        continue-on-error: true
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_ORGANIZATION_ID: ${{ secrets.BUFFER_ORGANIZATION_ID }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          BUFFER_CHANNEL_NAME: ${{ secrets.BUFFER_CHANNEL_NAME }}
          BUFFER_CHANNEL_SERVICE: ${{ secrets.BUFFER_CHANNEL_SERVICE }}
          BUFFER_POST_MODE: ${{ secrets.BUFFER_POST_MODE }}
          BUFFER_POST_TEMPLATE: ${{ secrets.BUFFER_POST_TEMPLATE }}
        shell: bash
        run: |
          python3 scripts/post_buffer_release.py \
            --app-name "$APP_NAME" \
            --tag "$RELEASE_TAG" \
            --release-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}" \
            --platform "macOS=${{ needs.build-macos.result }}" \
            --platform "Windows=${{ needs.build-windows.result }}" \
            --platform "Linux=${{ needs.build-linux.result }}"
