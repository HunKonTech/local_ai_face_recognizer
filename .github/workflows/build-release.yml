name: Build And Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: Face-Local
  OWNER: ${{ github.repository_owner }}

jobs:
  pick-runner:
    name: Pick build runner
    runs-on: ubuntu-latest
    outputs:
      mac_runner: ${{ steps.pick_mac.outputs.runner }}
      mac_runner_note: ${{ steps.pick_mac.outputs.runner_note }}
      windows_runner: ${{ steps.pick_windows.outputs.runner }}
      windows_runner_note: ${{ steps.pick_windows.outputs.runner_note }}
    steps:
      - name: Pick macOS runner
        id: pick_mac
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_TOKEN }}
        shell: bash
        run: |
          STATUS=$(gh api "orgs/${{ env.OWNER }}/actions/runners" \
            --jq '.runners[] | select(.name == "Koncsik-MacBook-Air") | .status' 2>/dev/null || echo "")

          if [ "$STATUS" = "online" ]; then
            echo 'runner=["self-hosted", "macOS", "ARM64"]' >> "$GITHUB_OUTPUT"
            echo 'runner_note=Runner: Koncsik-MacBook-Air (online)' >> "$GITHUB_OUTPUT"
          else
            echo 'runner=["macos-latest"]' >> "$GITHUB_OUTPUT"
            echo 'runner_note=Runner: macos-latest (fallback)' >> "$GITHUB_OUTPUT"
          fi

      - name: Pick Windows runner
        id: pick_windows
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_TOKEN }}
        shell: bash
        run: |
          STATUS=$(gh api "orgs/${{ env.OWNER }}/actions/runners" \
            --jq '.runners[] | select(.name == "nagy_gep_windows") | .status' 2>/dev/null || echo "")

          if [ "$STATUS" = "online" ]; then
            echo 'runner=["self-hosted", "Windows", "X64"]' >> "$GITHUB_OUTPUT"
            echo 'runner_note=Runner: nagy_gep_windows (online)' >> "$GITHUB_OUTPUT"
          else
            echo 'runner=["windows-latest"]' >> "$GITHUB_OUTPUT"
            echo 'runner_note=Runner: windows-latest (fallback)' >> "$GITHUB_OUTPUT"
          fi

  prepare:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.meta.outputs.base_version }}
      package_version: ${{ steps.meta.outputs.package_version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: meta
        shell: bash
        run: |
          git fetch --tags --force
          export BASE_VERSION="$(python - <<'PY'
          import os
          import re
          import subprocess
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              configured = tomllib.load(fh)["project"]["version"]

          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", configured)
          if not match:
              raise SystemExit(f"pyproject version must be semver x.y.z, got: {configured}")

          major, minor, patch_floor = map(int, match.groups())
          prefix = f"v{major}.{minor}."
          tags = subprocess.check_output(["git", "tag", "--list", f"{prefix}*"], text=True).splitlines()

          patch_numbers = []
          for tag in tags:
              tag_match = re.fullmatch(rf"v{major}\.{minor}\.(\d+)", tag.strip())
              if tag_match:
                  patch_numbers.append(int(tag_match.group(1)))

          next_patch = patch_floor if not patch_numbers else max(max(patch_numbers) + 1, patch_floor)
          print(f"{major}.{minor}.{next_patch}")
          PY
          )"
          PACKAGE_VERSION="$BASE_VERSION"
          TAG="v${PACKAGE_VERSION}"
          RELEASE_NAME="Face-Local v${PACKAGE_VERSION}"

          {
            echo "base_version=$BASE_VERSION"
            echo "package_version=$PACKAGE_VERSION"
            echo "tag=$TAG"
            echo "release_name=$RELEASE_NAME"
          } >> "$GITHUB_OUTPUT"

  build-macos:
    needs:
      - prepare
      - pick-runner
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.mac_runner) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected macOS runner
        shell: bash
        run: echo "${{ needs.pick-runner.outputs.mac_runner_note }}"

      - name: Prepare writable Python tool cache
        if: ${{ !contains(needs.pick-runner.outputs.mac_runner, 'self-hosted') }}
        shell: bash
        run: |
          TOOLCACHE="${RUNNER_TEMP}/hostedtoolcache"
          mkdir -p "$TOOLCACHE"
          echo "AGENT_TOOLSDIRECTORY=$TOOLCACHE" >> "$GITHUB_ENV"
          echo "RUNNER_TOOL_CACHE=$TOOLCACHE" >> "$GITHUB_ENV"

      - name: Select local Python on self-hosted macOS
        if: ${{ contains(needs.pick-runner.outputs.mac_runner, 'self-hosted') }}
        shell: bash
        run: |
          find_python() {
            for candidate in python3.11 python3.12 python3.13 python3 python; do
              if command -v "$candidate" >/dev/null 2>&1; then
                if "$candidate" - <<'PY' >/dev/null 2>&1
          import sys
          raise SystemExit(0 if sys.version_info >= (3, 11) else 1)
          PY
                then
                  command -v "$candidate"
                  return 0
                fi
              fi
            done
            return 1
          }

          PY_BIN="$(find_python)" || {
            echo "Python 3.11+ was not found on the self-hosted macOS runner." >&2
            exit 1
          }

          SHIM_DIR="${RUNNER_TEMP}/python-shims"
          mkdir -p "$SHIM_DIR"
          ln -sf "$PY_BIN" "$SHIM_DIR/python"
          echo "$SHIM_DIR" >> "$GITHUB_PATH"
          echo "MACOS_PYTHON_BIN=$PY_BIN" >> "$GITHUB_ENV"
          "$PY_BIN" --version

      - uses: actions/setup-python@v6
        if: ${{ !contains(needs.pick-runner.outputs.mac_runner, 'self-hosted') }}
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build bundled app
        shell: bash
        run: python scripts/package_app.py --version "${{ needs.prepare.outputs.package_version }}"

      - name: Create release directory
        shell: bash
        run: mkdir -p release

      - name: Package macOS app
        shell: bash
        run: |
          rm -rf release/dmg-root
          mkdir -p release/dmg-root
          cp -R "dist/Face-Local.app" "release/dmg-root/"
          ln -s /Applications "release/dmg-root/Applications"
          hdiutil create \
            -volname "Face-Local" \
            -srcfolder "release/dmg-root" \
            -ov \
            -format UDZO \
            "release/Face-Local-macOS-installer-${{ needs.prepare.outputs.package_version }}.dmg"
          rm -rf release/dmg-root

      - name: Upload macOS assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python scripts/github_release.py upload \
            --repo "$GITHUB_REPOSITORY" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --name "${{ needs.prepare.outputs.release_name }}" \
            "release/*.dmg"

  build-windows:
    needs:
      - prepare
      - pick-runner
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.windows_runner) }}
    steps:
      - uses: actions/checkout@v6

      - name: Selected Windows runner
        shell: bash
        run: echo "${{ needs.pick-runner.outputs.windows_runner_note }}"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build bundled app
        shell: bash
        run: python scripts/package_app.py --version "${{ needs.prepare.outputs.package_version }}"

      - name: Create release directory
        shell: bash
        run: mkdir -p release

      - name: Package Windows installer
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ needs.prepare.outputs.package_version }}" "scripts\build_windows_installer.iss"
          Compress-Archive -Path "dist\Face-Local\*" -DestinationPath "release\Face-Local-windows-portable-${{ needs.prepare.outputs.package_version }}.zip" -Force

      - name: Upload Windows assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python scripts/github_release.py upload \
            --repo "$GITHUB_REPOSITORY" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --name "${{ needs.prepare.outputs.release_name }}" \
            "release/*.zip" \
            "release/*.exe"

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Linux packaging dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev libgl1 libglib2.0-0 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build bundled app
        shell: bash
        run: python scripts/package_app.py --version "${{ needs.prepare.outputs.package_version }}"

      - name: Create release directory
        shell: bash
        run: mkdir -p release

      - name: Package Linux installer
        shell: bash
        run: |
          chmod +x scripts/build_linux_deb.sh
          scripts/build_linux_deb.sh "${{ needs.prepare.outputs.package_version }}"

      - name: Upload Linux assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python scripts/github_release.py upload \
            --repo "$GITHUB_REPOSITORY" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --name "${{ needs.prepare.outputs.release_name }}" \
            "release/*.deb" \
            "release/*.tar.gz"

  release:
    if: >-
      ${{
        always() &&
        (
          needs.build-macos.result == 'success' ||
          needs.build-windows.result == 'success' ||
          needs.build-linux.result == 'success'
        )
      }}
    needs:
      - prepare
      - pick-runner
      - build-macos
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update GitHub release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          notes=$'Automated cross-platform build from `main`.\n\n'
          notes+="- Commit: ${GITHUB_SHA}"$'\n'
          notes+="- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"$'\n'
          notes+="- macOS runner: ${{ needs.pick-runner.outputs.mac_runner_note }}"$'\n'
          notes+="- Windows runner: ${{ needs.pick-runner.outputs.windows_runner_note }}"$'\n'
          notes+="- macOS build: ${{ needs.build-macos.result }}"$'\n'
          notes+="- Windows build: ${{ needs.build-windows.result }}"$'\n'
          notes+="- Linux build: ${{ needs.build-linux.result }}"$'\n'
          python3 scripts/github_release.py update-notes \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --name "$RELEASE_NAME" \
            --notes "$notes"

  post-to-buffer:
    if: ${{ needs.release.result == 'success' && github.event_name == 'push' && github.run_attempt == 1 }}
    needs:
      - prepare
      - build-macos
      - build-windows
      - build-linux
      - release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Post release announcement via Buffer
        continue-on-error: true
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_ORGANIZATION_ID: ${{ secrets.BUFFER_ORGANIZATION_ID }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          BUFFER_CHANNEL_NAME: ${{ secrets.BUFFER_CHANNEL_NAME }}
          BUFFER_CHANNEL_SERVICE: ${{ secrets.BUFFER_CHANNEL_SERVICE }}
          BUFFER_POST_MODE: ${{ secrets.BUFFER_POST_MODE }}
          BUFFER_POST_TEMPLATE: ${{ secrets.BUFFER_POST_TEMPLATE }}
        shell: bash
        run: |
          python3 scripts/post_buffer_release.py \
            --app-name "$APP_NAME" \
            --tag "$RELEASE_TAG" \
            --release-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}" \
            --platform "macOS=${{ needs.build-macos.result }}" \
            --platform "Windows=${{ needs.build-windows.result }}" \
            --platform "Linux=${{ needs.build-linux.result }}"
